model:
  name: qwen2.5-1.5b
  family: qwen2
  path: /home/zyzhao/lfw_opt/models/Qwen2.5-1.5B
  num_layers: 28
  attn_implementation: null

quantization:
  enabled: true
  mode: quant_forward
  model_family: qwen2
  quantize_linear: true
  quantize_matmul: false

  scale_dir: /home/zyzhao/lfw_opt/opt-qt/quant_scale/qwen2.5-1.5b/linear_int8_fineweb/

  calibration_policy:
    default: auto
    layer_policy:
      q_proj: recalibrate
      k_proj: recalibrate
      v_proj: recalibrate
      o_proj: recalibrate
      gate_proj: recalibrate
      up_proj: recalibrate
      down_proj: recalibrate

  per_layer_policy: {}

  q_proj:
    a_bit: 8
    w_bit: 8
    o_bit: 8
    d_bit: 4
    outlier_ratio: 0.01
    p: 4

  k_proj:
    a_bit: 8
    w_bit: 8
    o_bit: 8
    d_bit: 4
    outlier_ratio: 0.01
    p: 4

  v_proj:
    a_bit: 8
    w_bit: 8
    o_bit: 8
    d_bit: 4
    outlier_ratio: 0.01
    p: 4

  o_proj:
    a_bit: 8
    w_bit: 8
    o_bit: 8
    d_bit: 4
    outlier_ratio: 0.01
    p: 4

  gate_proj:
    a_bit: 8
    w_bit: 8
    o_bit: 8
    d_bit: 4
    outlier_ratio: 0.01
    p: 4

  up_proj:
    a_bit: 8
    w_bit: 8
    o_bit: 8
    d_bit: 4
    outlier_ratio: 0.01
    p: 4

  down_proj:
    a_bit: 8
    w_bit: 8
    o_bit: 8
    d_bit: 4
    outlier_ratio: 0.01
    p: 4

  lm_head:
    enabled: false

calibration:
  dataset: HuggingFaceFW/fineweb
  dataset_config: sample-10BT
  split: train
  streaming: true
  text_column: text
  min_text_tokens: 128
  num_samples: 64
  seq_length: 8192
  batch_size: 1
  seed: 23

evaluation:
  seq_length: 8192
  max_eval_tokens: 65536
  min_doc_tokens: 128
  datasets:
    - name: HuggingFaceFW/fineweb
      config: sample-10BT
      split: train
      streaming: true
      text_column: text
      max_eval_tokens: 65536
      min_doc_tokens: 128

generation:
  max_length: 100
  temperature: 1.0
  top_k: 50
  top_p: 0.95
  do_sample: true
  num_return_sequences: 1

logging:
  level: INFO
  log_dir: ./logs
  tensorboard: false
  wandb: false
  wandb_project: qwen-quantization