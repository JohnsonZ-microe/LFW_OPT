  mode: quant_forward
  scale_dir: /home/zyzhao/lfw_opt/opt-qt/quant_scale/Int12/
  q_proj:
    a_bit: 16
    w_bit: 16
    o_bit: 16
    d_bit: 4
    p: 4
  k_proj:
    a_bit: 16
    w_bit: 16
    o_bit: 16
    d_bit: 4
    p: 4
  v_proj:
    a_bit: 16
    w_bit: 16
    o_bit: 16
    d_bit: 4
    p: 4
  out_proj:
    a_bit: 16
    w_bit: 16
    o_bit: 16
    d_bit: 4
    p: 4
  fc1:
    a_bit: 16
    w_bit: 16
    o_bit: 16
    d_bit: 4
    p: 4
  fc2:
    a_bit: 16
    w_bit: 16
    o_bit: 16
    d_bit: 4
    p: 4
  lm_head:
    enabled: true
    a_bit: 16
    w_bit: 16
    o_bit: 16
    d_bit: 4
    p: 4
  qk_matmul:
    A_bit: 16
    B_bit: 16
    O_bit: 16
    d_bit: 4
    p: 4
  pv_matmul:
    A_bit: 16
    B_bit: 16
    O_bit: 16
    d_bit: 4
    p: 4
calibration:
  dataset: wikitext
  dataset_config: wikitext-2-raw-v1
