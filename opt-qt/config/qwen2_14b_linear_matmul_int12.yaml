model:
  name: qwen2.5-14b
  family: qwen2
  path: /home/zyzhao/lfw_opt/models/Qwen2.5-14B
  num_layers: 48

  attn_implementation: eager

quantization:
  enabled: true
  mode: quant_forward
  model_family: qwen2

  quantize_linear: true
  quantize_matmul: true

  scale_dir: /home/zyzhao/lfw_opt/opt-qt/quant_scale/qwen2.5-14b/linear_matmul_int12_fineweb/

  calibration_policy:
    default: auto
    layer_policy:
      q_proj: recalibrate
      k_proj: recalibrate
      v_proj: recalibrate
      o_proj: recalibrate
      gate_proj: recalibrate
      up_proj: recalibrate
      down_proj: recalibrate
      qk_matmul: recalibrate
      pv_matmul: recalibrate

  per_layer_policy: {}

  q_proj:
    a_bit: 12
    w_bit: 12
    o_bit: 12
    d_bit: 4
    outlier_ratio: 0.0
    p: 4

  k_proj:
    a_bit: 12
    w_bit: 12
    o_bit: 12
    d_bit: 4
    outlier_ratio: 0.0
    p: 4

  v_proj:
    a_bit: 12
    w_bit: 12
    o_bit: 12
    d_bit: 4
    outlier_ratio: 0.0
    p: 4

  o_proj:
    a_bit: 12
    w_bit: 12
    o_bit: 12
    d_bit: 4
    outlier_ratio: 0.0
    p: 4

  gate_proj:
    a_bit: 12
    w_bit: 12
    o_bit: 12
    d_bit: 4
    outlier_ratio: 0.0
    p: 4

  up_proj:
    a_bit: 12
    w_bit: 12
    o_bit: 12
    d_bit: 4
    outlier_ratio: 0.0
    p: 4

  down_proj:
    a_bit: 12
    w_bit: 12
    o_bit: 12
    d_bit: 4
    outlier_ratio: 0.0
    p: 4

  qk_matmul:
    A_bit: 12
    B_bit: 12
    O_bit: 12
    d_bit: 4
    outlier_ratio: 0.0
    p: 4

  pv_matmul:
    A_bit: 12
    B_bit: 12
    O_bit: 12
    d_bit: 4
    outlier_ratio: 0.0
    p: 4

  lm_head:
    enabled: false

calibration:
  dataset: HuggingFaceFW/fineweb
  dataset_config: sample-10BT
  split: train
  streaming: true
  text_column: text
  min_text_tokens: 128

  num_samples: 64
  seq_length: 2048
  batch_size: 1
  seed: 23

evaluation:
  seq_length: 2048
  max_eval_tokens: 65536
  min_doc_tokens: 128
  datasets:
    - name: HuggingFaceFW/fineweb
      config: sample-10BT
      split: train
      streaming: true
      text_column: text
      max_eval_tokens: 65536
      min_doc_tokens: 128

generation:
  max_length: 100
  temperature: 1.0
  top_k: 50
  top_p: 0.95
  do_sample: true
  num_return_sequences: 1

logging:
  level: INFO
  log_dir: ./logs
  tensorboard: false
  wandb: false
  wandb_project: qwen-quantization
