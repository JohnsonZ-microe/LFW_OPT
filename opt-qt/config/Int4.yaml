# Int4 Aggressive Quantization Configuration for OPT Model

model:
  name: "opt-1.3b"
  path: "/home/zyzhao/lfw_opt/models/opt-1.3b"
  num_layers: 24

quantization:
  enabled: true
  mode: "quant_forward"
  scale_dir: "/home/zyzhao/lfw_opt/opt-qt/quant_scale/Int4/"
  
  # Attention projection layers - 4-bit weights
  q_proj:
    a_bit: 8
    w_bit: 4
    o_bit: 8
    d_bit: 4
    p: 4
  
  k_proj:
    a_bit: 8
    w_bit: 4
    o_bit: 8
    d_bit: 4
    p: 4
  
  v_proj:
    a_bit: 8
    w_bit: 4
    o_bit: 8
    d_bit: 4
    p: 4
  
  out_proj:
    a_bit: 8
    w_bit: 4
    o_bit: 8
    d_bit: 4
    p: 4
  
  # Feed-forward layers - 4-bit weights
  fc1:
    a_bit: 8
    w_bit: 4
    o_bit: 8
    d_bit: 4
    p: 4
  
  fc2:
    a_bit: 8
    w_bit: 4
    o_bit: 8
    d_bit: 4
    p: 4
  
  # LM Head - keep higher precision
  lm_head:
    enabled: true
    a_bit: 8
    w_bit: 8
    o_bit: 8
    d_bit: 4
    p: 4
  
  # Matrix multiplication operations
  qk_matmul:
    A_bit: 8
    B_bit: 8
    O_bit: 10
    d_bit: 4
    p: 4
  
  pv_matmul:
    A_bit: 10
    B_bit: 8
    O_bit: 8
    d_bit: 4
    p: 4

calibration:
  dataset: "wikitext"
  dataset_config: "wikitext-2-raw-v1"
  split: "train"
  num_samples: 256  # More samples for 4-bit calibration
  seq_length: 2048
  batch_size: 1
  seed: 42

evaluation:
  datasets:
    - name: "wikitext"
      config: "wikitext-2-raw-v1"
      split: "test"
  metrics:
    - "perplexity"
  batch_size: 1
  max_samples: -1

generation:
  max_length: 100
  temperature: 1.0
  top_k: 50
  top_p: 0.95
  do_sample: true
  num_return_sequences: 1

logging:
  level: "INFO"
  log_dir: "./logs"
  tensorboard: false
  wandb: false

